<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taranbir for EEMA – Manifesto | White Horse Events</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #fdf6f0;
            font-family: 'Playfair Display', serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .header {
            background: #fdf6f0;
            border-bottom: 1px solid #e8d5c4;
            padding: 18px 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            color: #8b5e3c;
            font-family: 'Playfair Display', serif;
            font-size: 12px;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            text-decoration: none;
            padding: 7px 16px;
            border: 1px solid #bc7e59;
            border-radius: 2px;
            transition: all 0.2s;
        }
        .back-btn:hover {
            background: #8b5e3c;
            color: white;
        }

        .page-title {
            color: #8b5e3c;
            font-size: 18px;
            font-weight: 400;
            letter-spacing: 0.14em;
            text-transform: uppercase;
        }

        .download-btn {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            background: #8b5e3c;
            color: white;
            font-family: 'Playfair Display', serif;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            padding: 8px 18px;
            border-radius: 2px;
            text-decoration: none;
            transition: all 0.2s;
        }
        .download-btn:hover {
            background: #bc7e59;
        }

        /* PDF Container */
        .pdf-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 30px 40px 40px;
            max-width: 1100px;
            width: 100%;
            margin: 0 auto;
        }

        .pdf-subtitle {
            color: #bc7e59;
            font-size: 13px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            margin-bottom: 20px;
            text-align: center;
        }

        .pdf-frame-wrap {
            flex: 1;
            border: 1px solid #e8d5c4;
            border-radius: 4px;
            overflow: hidden;
            box-shadow: 0 4px 24px rgba(139,94,60,0.08);
            min-height: 80vh;
        }

        iframe {
            width: 100%;
            height: 100%;
            min-height: 80vh;
            border: none;
            display: block;
        }

        /* Fallback message */
        .pdf-fallback {
            display: none;
            text-align: center;
            padding: 60px 20px;
            color: #8b5e3c;
        }
        .pdf-fallback p {
            font-size: 15px;
            margin-bottom: 20px;
            letter-spacing: 0.06em;
        }

        /* Mobile */
        @media (max-width: 640px) {
            .header { padding: 14px 16px; }
            .page-title { font-size: 14px; }
            .pdf-wrapper { padding: 16px 12px 24px; }
            .pdf-frame-wrap { min-height: 70vh; }
            iframe { min-height: 70vh; }
        }
    </style>
</head>
<body>

    <!-- Header -->
    <header class="header">
        <div class="header-left">
            <a href="index.html" class="back-btn">
                <svg viewBox="0 0 24 24" fill="currentColor" width="13" height="13">
                    <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/>
                </svg>
                Back
            </a>
            <span class="page-title">Taranbir for EEMA — Manifesto</span>
        </div>
        <a href="Taranbir for EEMA - 2026.pdf" download="Taranbir for EEMA - 2026.pdf" class="download-btn">
            <svg viewBox="0 0 24 24" fill="currentColor" width="13" height="13">
                <path d="M12 16l-5-5 1.41-1.41L11 13.17V4h2v9.17l2.59-2.58L17 11l-5 5zm-7 2h14v2H5v-2z"/>
            </svg>
            Download PDF
        </a>
    </header>

    <!-- PDF Viewer -->
    <div class="pdf-wrapper">
        <p class="pdf-subtitle">2026 Election Manifesto</p>
        <div class="pdf-frame-wrap">
            <iframe
                src="Taranbir for EEMA - 2026.pdf"
                title="Taranbir for EEMA Manifesto 2026"
                allowfullscreen>
                <!-- Fallback for browsers that block iframes -->
                <div class="pdf-fallback" style="display:block;">
                    <p>Your browser cannot display the PDF inline.</p>
                    <a href="Taranbir for EEMA - 2026.pdf" download class="download-btn">Download Manifesto PDF</a>
                </div>
            </iframe>
        </div>
    </div>

</body>
</html>
